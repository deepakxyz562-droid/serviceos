<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#059669;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#10b981;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="wrench-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.95" />
      <stop offset="100%" style="stop-color:#e2e8f0;stop-opacity:0.95" />
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="96" ry="96" fill="url(#bg-gradient)" />
  <!-- Wrench icon -->
  <g transform="translate(256, 256) rotate(-45) scale(1.1)">
    <!-- Wrench handle -->
    <rect x="-18" y="0" width="36" height="160" rx="8" fill="url(#wrench-gradient)" />
    <!-- Wrench head -->
    <path d="M-50,-10 L-18,-10 L-18,10 L-50,10 L-50,40 L-18,40 C5,40 22,20 22,0 C22,-20 5,-40 -18,-40 L-50,-40 Z" fill="url(#wrench-gradient)" />
  </g>
  <!-- Small gear accent -->
  <g transform="translate(360, 150)" fill="white" opacity="0.9">
    <circle cx="0" cy="0" r="28" fill="none" stroke="white" stroke-width="10" />
    <circle cx="0" cy="0" r="10" fill="white" />
    <!-- Gear teeth -->
    <rect x="-8" y="-42" width="16" height="20" rx="4" fill="white" />
    <rect x="-8" y="22" width="16" height="20" rx="4" fill="white" />
    <rect x="-42" y="-8" width="20" height="16" rx="4" fill="white" />
    <rect x="22" y="-8" width="20" height="16" rx="4" fill="white" />
    <rect x="18" y="-32" width="16" height="20" rx="4" fill="white" transform="rotate(45)" />
    <rect x="-34" y="12" width="16" height="20" rx="4" fill="white" transform="rotate(45)" />
    <rect x="12" y="18" width="20" height="16" rx="4" fill="white" transform="rotate(45)" />
    <rect x="-32" y="-34" width="20" height="16" rx="4" fill="white" transform="rotate(45)" />
  </g>
</svg>
