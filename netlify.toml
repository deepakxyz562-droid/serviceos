# Netlify deployment configuration for ServiceOS
# This file ensures Next.js API routes work correctly as serverless functions

[build]
  command = "prisma generate && next build"
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Ensure API routes have enough timeout for database operations
[functions]
  node_bundler = "esbuild"
  included_files = ["prisma/**/*"]

# Environment variables that should be set in Netlify Dashboard:
# - DATABASE_URL (Neon PostgreSQL pooled connection URL)
# - DIRECT_URL (Neon PostgreSQL direct connection URL)
# - NEXT_PUBLIC_APP_URL (https://serviceosapp.netlify.app)
# - GOOGLE_CLIENT_ID
# - GOOGLE_CLIENT_SECRET
# - JWT_SECRET
# - PAYPAL_CLIENT_ID
# - PAYPAL_CLIENT_SECRET
# - PAYPAL_SANDBOX
